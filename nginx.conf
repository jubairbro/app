server {
    listen 80;
    server_name online-store-manage.jubairsensei.site;
    root /var/www/saikat-erp/dist;
    index index.html;

    # Handle Static Uploads directly via Nginx
    location /uploads/ {
        alias /var/www/saikat-erp/uploads/;
        autoindex off;
        allow all;
    }

    # Handle Static Assets from Vite build
    location /assets/ {
        root /var/www/saikat-erp/dist;
    }

    # API Requests
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA Routing (Redirect all other requests to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
